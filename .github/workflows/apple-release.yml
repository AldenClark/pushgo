name: Apple Release

on:
  push:
    tags:
      - "v*"

jobs:
  app_store_release:
    runs-on: macos-26
    timeout-minutes: 120
    env:
      APP_PROJECT: pushgo.xcodeproj
      APP_SCHEME: PushGo-iOS
      APP_MACOS_SCHEME: PushGo-macOS
      APP_BUNDLE_ID: io.ethan.pushgo
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      ASC_KEY_IS_BASE64: ${{ vars.ASC_KEY_IS_BASE64 || 'false' }}
      TESTFLIGHT_EXTERNAL_GROUPS: ${{ vars.TESTFLIGHT_EXTERNAL_GROUPS || '' }}
      APP_STORE_SUBMIT_FOR_REVIEW: ${{ vars.APP_STORE_SUBMIT_FOR_REVIEW || 'false' }}
      APP_STORE_AUTOMATIC_RELEASE: "true"
      APPLE_DISTRIBUTION_IDENTITY: ${{ vars.APPLE_DISTRIBUTION_IDENTITY || '' }}
      MAC_INSTALLER_DISTRIBUTION_IDENTITY: ${{ vars.MAC_INSTALLER_DISTRIBUTION_IDENTITY || '' }}
      FASTLANE_DISABLE_COLORS: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      NETWORK_MAX_ATTEMPTS: ${{ vars.NETWORK_MAX_ATTEMPTS || '3' }}
      NETWORK_RETRY_BASE_SECONDS: ${{ vars.NETWORK_RETRY_BASE_SECONDS || '20' }}
      ASC_UPLOAD_MAX_ATTEMPTS: ${{ vars.ASC_UPLOAD_MAX_ATTEMPTS || '3' }}
      ASC_UPLOAD_RETRY_BASE_SECONDS: ${{ vars.ASC_UPLOAD_RETRY_BASE_SECONDS || '20' }}
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Setup Bundler
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/retry_command.sh --always -- \
            gem install bundler -v 2.5.23 --no-document
          bundle _2.5.23_ config set path vendor/bundle
          bash ./scripts/retry_command.sh --always -- \
            bundle _2.5.23_ install --jobs 4 --retry 3

      - name: Resolve SemVer release context
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME:-}"
          release_kind=""
          semver_version=""
          semver_full_version=""

          if [[ "$tag_name" =~ ^v(([0-9]+\.[0-9]+\.[0-9]+)-beta\.[0-9]+)$ ]]; then
            release_kind="beta"
            semver_full_version="${BASH_REMATCH[1]}"
            semver_version="${BASH_REMATCH[2]}"
          elif [[ "$tag_name" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            release_kind="release"
            semver_full_version="${BASH_REMATCH[1]}"
            semver_version="${BASH_REMATCH[1]}"
          else
            echo "Unsupported tag format: $tag_name"
            echo "Allowed formats: vX.Y.Z or vX.Y.Z-beta.N"
            exit 1
          fi

          {
            echo "release_kind=$release_kind"
            echo "semver_version=$semver_version"
            echo "semver_full_version=$semver_full_version"
          } >> "$GITHUB_OUTPUT"

          {
            echo "RELEASE_KIND=$release_kind"
            echo "SEMVER_VERSION=$semver_version"
            echo "SEMVER_FULL_VERSION=$semver_full_version"
            echo "PUSHGO_DISPLAY_VERSION=v$semver_full_version"
          } >> "$GITHUB_ENV"

      - name: Resolve App Store build version
        shell: bash
        run: |
          set -euo pipefail

          bundle _2.5.23_ exec ruby <<'RUBY'
          require "xcodeproj"

          project_path = ENV.fetch("APP_PROJECT")
          semver_version = ENV.fetch("SEMVER_VERSION")
          target_names = [
            ENV.fetch("APP_SCHEME", "PushGo-iOS"),
            ENV.fetch("APP_MACOS_SCHEME", "PushGo-macOS")
          ].uniq

          project = Xcodeproj::Project.open(project_path)
          targets = target_names.map do |name|
            target = project.targets.find { |candidate| candidate.name == name }
            abort("Missing Xcode target #{name.inspect} in #{project_path}") unless target
            target
          end

          release_settings = targets.map do |target|
            config = target.build_configurations.find { |candidate| candidate.name == "Release" }
            abort("Missing Release build configuration for #{target.name}") unless config

            settings = config.build_settings
            {
              target: target.name,
              marketing_version: settings["MARKETING_VERSION"].to_s.strip,
              build_number: settings["CURRENT_PROJECT_VERSION"].to_s.strip
            }
          end

          errors = []
          release_settings.each do |entry|
            if entry[:marketing_version] != semver_version
              errors << "#{entry[:target]} MARKETING_VERSION=#{entry[:marketing_version].inspect}, expected #{semver_version.inspect}"
            end
            if entry[:build_number].empty?
              errors << "#{entry[:target]} CURRENT_PROJECT_VERSION is empty"
            end
          end

          build_numbers = release_settings.map { |entry| entry[:build_number] }.uniq
          if build_numbers.length != 1
            errors << "Release build numbers differ: #{release_settings.map { |entry| "#{entry[:target]}=#{entry[:build_number]}" }.join(", ")}"
          end

          unless errors.empty?
            warn("Invalid App Store build version for this tag:")
            errors.each { |error| warn("- #{error}") }
            exit(1)
          end

          build_number = build_numbers.fetch(0)
          File.open(ENV.fetch("GITHUB_ENV"), "a") do |env|
            env.puts("APP_STORE_VERSION=#{semver_version}")
            env.puts("APP_STORE_BUILD_NUMBER=#{build_number}")
          end

          puts("Resolved App Store version #{semver_version} build #{build_number} from #{target_names.join(", ")}")
          RUBY

      - name: Validate App Store signing assets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=("APPLE_TEAM_ID")
          [[ -z "${ASC_KEY_ID:-}" ]] && missing+=("ASC_KEY_ID")
          [[ -z "${ASC_ISSUER_ID:-}" ]] && missing+=("ASC_ISSUER_ID")
          [[ -z "${ASC_KEY_P8:-}" ]] && missing+=("ASC_KEY_P8")
          [[ -z "${APPLE_DISTRIBUTION_P12_BASE64:-}" ]] && missing+=("APPLE_DISTRIBUTION_P12_BASE64")
          [[ -z "${APPLE_DISTRIBUTION_P12_PASSWORD:-}" ]] && missing+=("APPLE_DISTRIBUTION_P12_PASSWORD")
          [[ -z "${MAC_INSTALLER_DISTRIBUTION_P12_BASE64:-}" ]] && missing+=("MAC_INSTALLER_DISTRIBUTION_P12_BASE64")
          [[ -z "${MAC_INSTALLER_DISTRIBUTION_P12_PASSWORD:-}" ]] && missing+=("MAC_INSTALLER_DISTRIBUTION_P12_PASSWORD")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required secrets: %s\n' "${missing[*]}"
            exit 1
          fi
        env:
          APPLE_DISTRIBUTION_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          APPLE_DISTRIBUTION_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
          MAC_INSTALLER_DISTRIBUTION_P12_BASE64: ${{ secrets.MAC_INSTALLER_DISTRIBUTION_P12_BASE64 }}
          MAC_INSTALLER_DISTRIBUTION_P12_PASSWORD: ${{ secrets.MAC_INSTALLER_DISTRIBUTION_P12_PASSWORD }}

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/retry_command.sh --always -- swift package resolve

      - name: Extract release notes from release/update-notes
        shell: bash
        run: |
          set -euo pipefail
          version="v${SEMVER_FULL_VERSION}"
          release_notes_file="release/update-notes/${version}.json"
          if [[ ! -f "$release_notes_file" ]]; then
            echo "Missing $release_notes_file"
            exit 1
          fi

          notes_json_file="$RUNNER_TEMP/pushgo-app-store-notes.json"

          /usr/bin/python3 - "$release_notes_file" "$notes_json_file" <<'PY'
          import json
          import pathlib
          import sys

          source = pathlib.Path(sys.argv[1])
          output = pathlib.Path(sys.argv[2])
          required = ["en", "de", "es", "fr", "ja", "ko", "zh-CN", "zh-TW"]
          key_to_env = {
              "en": "APP_STORE_RELEASE_NOTES_EN_US",
              "de": "APP_STORE_RELEASE_NOTES_DE_DE",
              "es": "APP_STORE_RELEASE_NOTES_ES_ES",
              "fr": "APP_STORE_RELEASE_NOTES_FR_FR",
              "ja": "APP_STORE_RELEASE_NOTES_JA_JP",
              "ko": "APP_STORE_RELEASE_NOTES_KO_KR",
              "zh-CN": "APP_STORE_RELEASE_NOTES_ZH_HANS",
              "zh-TW": "APP_STORE_RELEASE_NOTES_ZH_HANT",
          }

          payload = json.loads(source.read_text(encoding="utf-8"))
          missing = [key for key in required if not isinstance(payload.get(key), str) or not payload[key].strip()]
          if missing:
              print(f"Missing required locale text in {source}: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          def trim_for_asc(text: str) -> str:
              text = text.rstrip()
              if len(text) > 3800:
                  return text[:3800] + "\n... (truncated for App Store/TestFlight limit; full notes are in GitHub Release body)"
              return text

          result = {env_key: trim_for_asc(payload[source_key]) for source_key, env_key in key_to_env.items()}
          output.write_text(json.dumps(result, ensure_ascii=False), encoding="utf-8")
          PY

          notes_json="$(cat "$notes_json_file")"
          en_notes="$(printf '%s' "$notes_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["APP_STORE_RELEASE_NOTES_EN_US"])')"
          de_notes="$(printf '%s' "$notes_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["APP_STORE_RELEASE_NOTES_DE_DE"])')"
          es_notes="$(printf '%s' "$notes_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["APP_STORE_RELEASE_NOTES_ES_ES"])')"
          fr_notes="$(printf '%s' "$notes_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["APP_STORE_RELEASE_NOTES_FR_FR"])')"
          ja_notes="$(printf '%s' "$notes_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["APP_STORE_RELEASE_NOTES_JA_JP"])')"
          ko_notes="$(printf '%s' "$notes_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["APP_STORE_RELEASE_NOTES_KO_KR"])')"
          zh_hans_notes="$(printf '%s' "$notes_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["APP_STORE_RELEASE_NOTES_ZH_HANS"])')"
          zh_hant_notes="$(printf '%s' "$notes_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["APP_STORE_RELEASE_NOTES_ZH_HANT"])')"

          {
            echo "TESTFLIGHT_CHANGELOG<<__PUSHGO_CHANGELOG_EOF__"
            printf "%s\n" "$en_notes"
            echo "__PUSHGO_CHANGELOG_EOF__"
            echo "APP_STORE_RELEASE_NOTES_EN_US<<__PUSHGO_RELEASE_NOTES_EN_EOF__"
            printf "%s\n" "$en_notes"
            echo "__PUSHGO_RELEASE_NOTES_EN_EOF__"
            echo "APP_STORE_RELEASE_NOTES_DE_DE<<__PUSHGO_RELEASE_NOTES_DE_EOF__"
            printf "%s\n" "$de_notes"
            echo "__PUSHGO_RELEASE_NOTES_DE_EOF__"
            echo "APP_STORE_RELEASE_NOTES_ES_ES<<__PUSHGO_RELEASE_NOTES_ES_EOF__"
            printf "%s\n" "$es_notes"
            echo "__PUSHGO_RELEASE_NOTES_ES_EOF__"
            echo "APP_STORE_RELEASE_NOTES_FR_FR<<__PUSHGO_RELEASE_NOTES_FR_EOF__"
            printf "%s\n" "$fr_notes"
            echo "__PUSHGO_RELEASE_NOTES_FR_EOF__"
            echo "APP_STORE_RELEASE_NOTES_JA_JP<<__PUSHGO_RELEASE_NOTES_JA_EOF__"
            printf "%s\n" "$ja_notes"
            echo "__PUSHGO_RELEASE_NOTES_JA_EOF__"
            echo "APP_STORE_RELEASE_NOTES_KO_KR<<__PUSHGO_RELEASE_NOTES_KO_EOF__"
            printf "%s\n" "$ko_notes"
            echo "__PUSHGO_RELEASE_NOTES_KO_EOF__"
            echo "APP_STORE_RELEASE_NOTES_ZH_HANS<<__PUSHGO_RELEASE_NOTES_ZH_EOF__"
            printf "%s\n" "$zh_hans_notes"
            echo "__PUSHGO_RELEASE_NOTES_ZH_EOF__"
            echo "APP_STORE_RELEASE_NOTES_ZH_HANT<<__PUSHGO_RELEASE_NOTES_ZH_HANT_EOF__"
            printf "%s\n" "$zh_hant_notes"
            echo "__PUSHGO_RELEASE_NOTES_ZH_HANT_EOF__"
          } >> "$GITHUB_ENV"

      - name: Generate App Store metadata from release/appstore
        shell: bash
        run: |
          set -euo pipefail
          appstore_metadata_file="release/appstore.json"
          if [[ ! -f "$appstore_metadata_file" ]]; then
            echo "Missing $appstore_metadata_file"
            exit 1
          fi

          /usr/bin/python3 - "$appstore_metadata_file" "fastlane/metadata" <<'PY'
          import json
          import pathlib
          import sys
          import textwrap
          import urllib.parse

          source = pathlib.Path(sys.argv[1])
          output_root = pathlib.Path(sys.argv[2])
          locale_to_fastlane = {
              "en-US": "en-US",
              "de-DE": "de-DE",
              "es-ES": "es-ES",
              "fr-FR": "fr-FR",
              "ja-JP": "ja",
              "ko-KR": "ko",
              "zh-Hans": "zh-Hans",
              "zh-Hant": "zh-Hant",
          }
          fields = {
              "promotional_text": ("promotional_text.txt", 170),
              "keywords": ("keywords.txt", 100),
              "description": ("description.txt", 4000),
              "support_url": ("support_url.txt", 255),
          }

          payload = json.loads(source.read_text(encoding="utf-8"))
          errors = []
          warnings = []

          def shorten_text(text: str, limit: int) -> str:
              return textwrap.shorten(text.rstrip(), width=limit, placeholder="")

          def shorten_description(text: str, limit: int) -> str:
              text = text.rstrip()
              if len(text) <= limit:
                  return text

              paragraphs = [part.rstrip() for part in text.split("\n\n")]
              current = ""
              for paragraph in paragraphs:
                  candidate = paragraph if not current else f"{current}\n\n{paragraph}"
                  if len(candidate) > limit:
                      break
                  current = candidate
              if current and len(current) >= min(2800, limit):
                  return current

              return shorten_text(text, limit)

          for source_locale, fastlane_locale in locale_to_fastlane.items():
              locale_payload = payload.get(source_locale)
              if not isinstance(locale_payload, dict):
                  errors.append(f"{source_locale}: missing locale object")
                  continue

              locale_dir = output_root / fastlane_locale
              locale_dir.mkdir(parents=True, exist_ok=True)

              for field_name, (filename, limit) in fields.items():
                  value = locale_payload.get(field_name)
                  if not isinstance(value, str) or not value.strip():
                      errors.append(f"{source_locale}.{field_name}: missing text")
                      continue

                  text = value.rstrip()
                  if field_name == "support_url":
                      parsed_url = urllib.parse.urlparse(text)
                      if parsed_url.scheme not in {"http", "https"} or not parsed_url.netloc:
                          errors.append(f"{source_locale}.{field_name}: expected an absolute http(s) URL")
                          continue
                  if field_name == "description" and len(text) > limit:
                      original_length = len(text)
                      text = shorten_description(text, limit)
                      warnings.append(
                          f"{source_locale}.{field_name}: shortened from {original_length} to {len(text)} characters"
                      )
                  elif field_name == "promotional_text" and len(text) > limit:
                      original_length = len(text)
                      text = shorten_text(text, limit)
                      warnings.append(
                          f"{source_locale}.{field_name}: shortened from {original_length} to {len(text)} characters"
                      )
                  elif len(text) > limit:
                      errors.append(f"{source_locale}.{field_name}: {len(text)} characters exceeds App Store limit {limit}")
                      continue

                  (locale_dir / filename).write_text(f"{text}\n", encoding="utf-8")

          if errors:
              print("Invalid App Store metadata in release/appstore.json:", file=sys.stderr)
              for error in errors:
                  print(f"- {error}", file=sys.stderr)
              sys.exit(1)

          for warning in warnings:
              print(f"::warning::{warning}")

          print(f"Wrote localized App Store metadata under {output_root}")
          PY

      - name: Import App Store signing certificates into temporary keychain
        shell: bash
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/pushgo-app-store-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          apple_distribution_p12="$RUNNER_TEMP/pushgo-apple-distribution.p12"
          mac_installer_p12="$RUNNER_TEMP/pushgo-mac-installer-distribution.p12"

          printf "%s" "$APPLE_DISTRIBUTION_P12_BASE64" | base64 --decode > "$apple_distribution_p12"
          printf "%s" "$MAC_INSTALLER_DISTRIBUTION_P12_BASE64" | base64 --decode > "$mac_installer_p12"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"

          import_p12() {
            local p12_path="$1"
            local p12_password="$2"
            security import "$p12_path" \
              -k "$keychain_path" \
              -P "$p12_password" \
              -T /usr/bin/codesign \
              -T /usr/bin/productbuild \
              -T /usr/bin/security \
              -T /usr/bin/xcrun
          }

          import_p12 "$apple_distribution_p12" "$APPLE_DISTRIBUTION_P12_PASSWORD"
          import_p12 "$mac_installer_p12" "$MAC_INSTALLER_DISTRIBUTION_P12_PASSWORD"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path" >/dev/null
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"

          codesigning_identity_output="$(security find-identity -v -p codesigning "$keychain_path")"
          basic_identity_output="$(security find-identity -v -p basic "$keychain_path")"
          printf '%s\n' "$codesigning_identity_output"
          printf '%s\n' "$basic_identity_output"

          if ! grep -q "Apple Distribution" <<<"$codesigning_identity_output"; then
            echo "Imported certificates do not expose an Apple Distribution signing identity."
            exit 1
          fi
          if ! grep -Eq "Mac Installer Distribution|3rd Party Mac Developer Installer" <<<"$basic_identity_output"; then
            echo "Imported certificates do not expose a Mac Installer Distribution signing identity."
            exit 1
          fi

          {
            echo "RELEASE_SIGNING_KEYCHAIN_PATH=$keychain_path"
            echo "RELEASE_SIGNING_KEYCHAIN_PASSWORD=$keychain_password"
          } >> "$GITHUB_ENV"
        env:
          APPLE_DISTRIBUTION_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          APPLE_DISTRIBUTION_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
          MAC_INSTALLER_DISTRIBUTION_P12_BASE64: ${{ secrets.MAC_INSTALLER_DISTRIBUTION_P12_BASE64 }}
          MAC_INSTALLER_DISTRIBUTION_P12_PASSWORD: ${{ secrets.MAC_INSTALLER_DISTRIBUTION_P12_PASSWORD }}

      - name: Normalize App Store Connect private key for Apple Actions
        id: normalize_asc_key
        shell: bash
        run: |
          set -euo pipefail
          decoded_key="${ASC_KEY_P8}"
          if [[ "${ASC_KEY_IS_BASE64}" == "true" ]]; then
            decoded_key="$(printf "%s" "${ASC_KEY_P8}" | base64 --decode)"
          fi
          {
            echo "api_private_key<<__PUSHGO_ASC_KEY_EOF__"
            printf "%s\n" "${decoded_key}"
            echo "__PUSHGO_ASC_KEY_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Download iOS App Store profile
        id: profile_ios_app
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: io.ethan.pushgo
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ steps.normalize_asc_key.outputs.api_private_key }}

      - name: Download iOS NSE App Store profile
        id: profile_ios_nse
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: io.ethan.pushgo.NotificationServiceExtension
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ steps.normalize_asc_key.outputs.api_private_key }}

      - name: Download watch App Store profile
        id: profile_watch_app
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: io.ethan.pushgo.watchkitapp
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ steps.normalize_asc_key.outputs.api_private_key }}

      - name: Download watch NSE App Store profile
        id: profile_watch_nse
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: io.ethan.pushgo.watchkitapp.NotificationServiceExtension
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ steps.normalize_asc_key.outputs.api_private_key }}

      - name: Download macOS App Store profile
        id: profile_macos_app
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: io.ethan.pushgo
          profile-type: MAC_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ steps.normalize_asc_key.outputs.api_private_key }}

      - name: Download macOS NSE App Store profile
        id: profile_macos_nse
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: io.ethan.pushgo.NotificationServiceExtension
          profile-type: MAC_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ steps.normalize_asc_key.outputs.api_private_key }}

      - name: Resolve downloaded provisioning profiles
        shell: bash
        run: |
          set -euo pipefail

          export_profile_metadata() {
            local json="$1"
            local expected_name="$2"
            local uuid_env="$3"
            local name_env="$4"
            local label="$5"
            local count uuid name filtered

            filtered="$(jq -c --arg name "$expected_name" '[.[] | select(.name == $name)]' <<<"$json")"
            count="$(jq 'length' <<<"$filtered")"
            if [[ "$count" != "1" ]]; then
              echo "Expected exactly one ${label} provisioning profile named '${expected_name}', found ${count}. Raw output: ${json}" >&2
              exit 1
            fi

            uuid="$(jq -r '.[0].udid' <<<"$filtered")"
            name="$(jq -r '.[0].name' <<<"$filtered")"

            if [[ -z "$uuid" || "$uuid" == "null" || -z "$name" || "$name" == "null" ]]; then
              echo "Downloaded ${label} provisioning profile metadata is incomplete: ${filtered}" >&2
              exit 1
            fi

            {
              echo "${uuid_env}=${uuid}"
              echo "${name_env}=${name}"
            } >> "$GITHUB_ENV"
          }

          export_profile_metadata '${{ steps.profile_ios_app.outputs.profiles }}' 'PushGo' 'APP_STORE_PROFILE_IOS_APP_UUID' 'APP_STORE_PROFILE_IOS_APP_NAME' 'iOS app'
          export_profile_metadata '${{ steps.profile_ios_nse.outputs.profiles }}' 'PushGo NSE' 'APP_STORE_PROFILE_IOS_NSE_UUID' 'APP_STORE_PROFILE_IOS_NSE_NAME' 'iOS NSE'
          export_profile_metadata '${{ steps.profile_watch_app.outputs.profiles }}' 'PushGo watch' 'APP_STORE_PROFILE_WATCH_APP_UUID' 'APP_STORE_PROFILE_WATCH_APP_NAME' 'watch app'
          export_profile_metadata '${{ steps.profile_watch_nse.outputs.profiles }}' 'PushGo watch NSE' 'APP_STORE_PROFILE_WATCH_NSE_UUID' 'APP_STORE_PROFILE_WATCH_NSE_NAME' 'watch NSE'
          export_profile_metadata '${{ steps.profile_macos_app.outputs.profiles }}' 'PushGo mac' 'APP_STORE_PROFILE_MACOS_APP_UUID' 'APP_STORE_PROFILE_MACOS_APP_NAME' 'macOS app'
          export_profile_metadata '${{ steps.profile_macos_nse.outputs.profiles }}' 'PushGo mac NSE' 'APP_STORE_PROFILE_MACOS_NSE_UUID' 'APP_STORE_PROFILE_MACOS_NSE_NAME' 'macOS NSE'

      - name: Run fastlane beta upload
        if: steps.resolve.outputs.release_kind == 'beta'
        run: bundle _2.5.23_ exec fastlane ios beta_upload

      - name: Run fastlane release upload
        if: steps.resolve.outputs.release_kind == 'release'
        run: bundle _2.5.23_ exec fastlane ios release_upload

      - name: Upload App Store diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pushgo-app-store-diagnostics-${{ github.run_id }}
          path: artifacts/release/**
          if-no-files-found: warn

  dmg_release:
    runs-on: macos-26
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      APP_PROJECT: pushgo.xcodeproj
      APP_MACOS_SCHEME: PushGo-macOS
      APP_MACOS_DMG_SCHEME: PushGo-macOS-DMG
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      ASC_KEY_IS_BASE64: ${{ vars.ASC_KEY_IS_BASE64 || 'false' }}
      DEVELOPER_ID_APPLICATION_IDENTITY: ${{ vars.DEVELOPER_ID_APPLICATION_IDENTITY || '' }}
      PUSHGO_SPARKLE_FEED_URL: ${{ vars.PUSHGO_SPARKLE_FEED_URL || 'https://update.pushgo.cn/macos/appcast.xml' }}
      PUSHGO_SPARKLE_BASE_URL: ${{ vars.PUSHGO_SPARKLE_BASE_URL != '' && vars.PUSHGO_SPARKLE_BASE_URL || secrets.PUSHGO_SPARKLE_BASE_URL }}
      PUSHGO_SPARKLE_SCHEDULED_CHECK_INTERVAL: ${{ vars.PUSHGO_SPARKLE_SCHEDULED_CHECK_INTERVAL || '21600' }}
      FASTLANE_DISABLE_COLORS: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      NETWORK_MAX_ATTEMPTS: ${{ vars.NETWORK_MAX_ATTEMPTS || '3' }}
      NETWORK_RETRY_BASE_SECONDS: ${{ vars.NETWORK_RETRY_BASE_SECONDS || '20' }}
      ASC_UPLOAD_MAX_ATTEMPTS: ${{ vars.ASC_UPLOAD_MAX_ATTEMPTS || '3' }}
      ASC_UPLOAD_RETRY_BASE_SECONDS: ${{ vars.ASC_UPLOAD_RETRY_BASE_SECONDS || '20' }}
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Setup Bundler
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/retry_command.sh --always -- \
            gem install bundler -v 2.5.23 --no-document
          bundle _2.5.23_ config set path vendor/bundle
          bash ./scripts/retry_command.sh --always -- \
            bundle _2.5.23_ install --jobs 4 --retry 3

      - name: Resolve SemVer release context
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME:-}"
          release_kind=""
          semver_version=""
          semver_full_version=""
          dmg_output_name=""

          if [[ "$tag_name" =~ ^v(([0-9]+\.[0-9]+\.[0-9]+)-beta\.[0-9]+)$ ]]; then
            release_kind="beta"
            semver_full_version="${BASH_REMATCH[1]}"
            semver_version="${BASH_REMATCH[2]}"
          elif [[ "$tag_name" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            release_kind="release"
            semver_full_version="${BASH_REMATCH[1]}"
            semver_version="${BASH_REMATCH[1]}"
          else
            echo "Unsupported tag format: $tag_name"
            echo "Allowed formats: vX.Y.Z or vX.Y.Z-beta.N"
            exit 1
          fi

          dmg_output_name="PushGo-macOS-v${semver_full_version}"

          {
            echo "release_kind=$release_kind"
            echo "semver_version=$semver_version"
            echo "semver_full_version=$semver_full_version"
            echo "dmg_output_name=$dmg_output_name"
          } >> "$GITHUB_OUTPUT"

          {
            echo "RELEASE_KIND=$release_kind"
            echo "SEMVER_VERSION=$semver_version"
            echo "SEMVER_FULL_VERSION=$semver_full_version"
            echo "DMG_OUTPUT_NAME=$dmg_output_name"
            echo "PUSHGO_DISPLAY_VERSION=v$semver_full_version"
          } >> "$GITHUB_ENV"

      - name: Prepare App Store Connect key file for notarization
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ASC_KEY_P8:-}" ]]; then
            echo "ASC_KEY_P8 is required"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/asc"
          ASC_KEY_PATH="$RUNNER_TEMP/asc/AuthKey_${ASC_KEY_ID}.p8"
          if [[ "${ASC_KEY_IS_BASE64}" == "true" ]]; then
            printf "%s" "$ASC_KEY_P8" | base64 --decode > "$ASC_KEY_PATH"
          else
            printf "%s" "$ASC_KEY_P8" > "$ASC_KEY_PATH"
          fi
          echo "ASC_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"

      - name: Validate DMG signing and deploy assets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${ASC_KEY_ID:-}" ]] && missing+=("ASC_KEY_ID")
          [[ -z "${ASC_ISSUER_ID:-}" ]] && missing+=("ASC_ISSUER_ID")
          [[ -z "${ASC_KEY_P8:-}" ]] && missing+=("ASC_KEY_P8")
          [[ -z "${DEVELOPER_ID_APPLICATION_P12_BASE64:-}" ]] && missing+=("DEVELOPER_ID_APPLICATION_P12_BASE64")
          [[ -z "${DEVELOPER_ID_APPLICATION_P12_PASSWORD:-}" ]] && missing+=("DEVELOPER_ID_APPLICATION_P12_PASSWORD")
          [[ -z "${PUSHGO_SPARKLE_BASE_URL:-}" ]] && missing+=("PUSHGO_SPARKLE_BASE_URL")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required secrets/vars: %s\n' "${missing[*]}"
            exit 1
          fi
        env:
          DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}

      - name: Normalize App Store Connect private key for Apple Actions
        id: normalize_asc_key
        shell: bash
        run: |
          set -euo pipefail
          decoded_key="${ASC_KEY_P8}"
          if [[ "${ASC_KEY_IS_BASE64}" == "true" ]]; then
            decoded_key="$(printf "%s" "${ASC_KEY_P8}" | base64 --decode)"
          fi
          {
            echo "api_private_key<<__PUSHGO_ASC_KEY_EOF__"
            printf "%s\n" "${decoded_key}"
            echo "__PUSHGO_ASC_KEY_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Download macOS direct-distribution profile
        id: profile_direct_macos_app
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: io.ethan.pushgo
          profile-type: MAC_APP_DIRECT
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ steps.normalize_asc_key.outputs.api_private_key }}

      - name: Download macOS direct-distribution NSE profile
        id: profile_direct_macos_nse
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: io.ethan.pushgo.NotificationServiceExtension
          profile-type: MAC_APP_DIRECT
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ steps.normalize_asc_key.outputs.api_private_key }}

      - name: Resolve direct-distribution provisioning profiles
        shell: bash
        run: |
          set -euo pipefail

          export_profile_metadata() {
            local json="$1"
            local expected_name="$2"
            local uuid_env="$3"
            local name_env="$4"
            local label="$5"
            local count uuid name filtered

            filtered="$(jq -c --arg name "$expected_name" '[.[] | select(.name == $name)]' <<<"$json")"
            count="$(jq 'length' <<<"$filtered")"
            if [[ "$count" != "1" ]]; then
              echo "Expected exactly one ${label} direct-distribution provisioning profile named '${expected_name}', found ${count}. Raw output: ${json}" >&2
              exit 1
            fi

            uuid="$(jq -r '.[0].udid' <<<"$filtered")"
            name="$(jq -r '.[0].name' <<<"$filtered")"
            if [[ -z "$uuid" || "$uuid" == "null" || -z "$name" || "$name" == "null" ]]; then
              echo "Downloaded ${label} direct-distribution provisioning profile metadata is incomplete: ${filtered}" >&2
              exit 1
            fi

            {
              echo "${uuid_env}=${uuid}"
              echo "${name_env}=${name}"
            } >> "$GITHUB_ENV"
          }

          export_profile_metadata '${{ steps.profile_direct_macos_app.outputs.profiles }}' 'PushGo mac direct' 'DEVELOPER_ID_PROFILE_MACOS_APP_UUID' 'DEVELOPER_ID_PROFILE_MACOS_APP_NAME' 'macOS app'
          export_profile_metadata '${{ steps.profile_direct_macos_nse.outputs.profiles }}' 'PushGo mac NSE direct' 'DEVELOPER_ID_PROFILE_MACOS_NSE_UUID' 'DEVELOPER_ID_PROFILE_MACOS_NSE_NAME' 'macOS NSE'

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/retry_command.sh --always -- swift package resolve

      - name: Extract release notes from release/RELEASE_NOTES
        shell: bash
        run: |
          set -euo pipefail
          release_notes_file="release/RELEASE_NOTES.md"
          if [[ ! -f "$release_notes_file" ]]; then
            echo "Missing $release_notes_file"
            exit 1
          fi

          if [[ "${RELEASE_KIND}" == "beta" ]]; then
            section="Unreleased"
          else
            section="v${SEMVER_VERSION}"
          fi

          section_body="$(awk -v sec="$section" '
            BEGIN { in_section = 0 }
            /^## \[/ {
              if (in_section == 1) exit
              if ($0 ~ "^## \\[" sec "\\]([[:space:]]|$|[[:space:]]-)") {
                in_section = 1
                next
              }
            }
            in_section == 1 { print }
          ' "$release_notes_file" | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}' )"

          if [[ -z "$section_body" ]]; then
            echo "RELEASE_NOTES section not found or empty: [$section]"
            exit 1
          fi

          release_title="PushGo macOS ${GITHUB_REF_NAME}"
          release_notes_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/release/RELEASE_NOTES.md"
          release_body="Source: [release/RELEASE_NOTES.md](${release_notes_url}) [$section]"$'\n\n'"$section_body"

          echo "RELEASE_CHANGELOG_BODY<<__PUSHGO_RELEASE_BODY_EOF__" >> "$GITHUB_ENV"
          printf "%s\n" "$release_body" >> "$GITHUB_ENV"
          echo "__PUSHGO_RELEASE_BODY_EOF__" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=${release_title}" >> "$GITHUB_ENV"

      - name: Validate Sparkle/update host configuration
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "${PUSHGO_SPARKLE_SCHEDULED_CHECK_INTERVAL:-}" =~ ^[0-9]+$ ]]; then
            echo "PUSHGO_SPARKLE_SCHEDULED_CHECK_INTERVAL must be an integer number of seconds"
            exit 1
          fi

          if ! [[ "${PUSHGO_SPARKLE_FEED_URL:-}" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "PUSHGO_SPARKLE_FEED_URL must be a valid http(s) URL"
            exit 1
          fi

          if ! [[ "${PUSHGO_SPARKLE_BASE_URL:-}" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "PUSHGO_SPARKLE_BASE_URL must be a valid http(s) URL"
            exit 1
          fi

      - name: Prepare Sparkle xcconfig for DMG
        shell: bash
        run: |
          set -euo pipefail
          sparkle_xcconfig="$RUNNER_TEMP/pushgo-dmg-sparkle.xcconfig"
          feed_url_xcconfig="$(printf '%s' "$PUSHGO_SPARKLE_FEED_URL" | sed 's#//#/$()/#g')"
          {
            printf 'PUSHGO_SPARKLE_FEED_URL = %s\n' "$feed_url_xcconfig"
            printf 'PUSHGO_SPARKLE_SCHEDULED_CHECK_INTERVAL = %s\n' "$PUSHGO_SPARKLE_SCHEDULED_CHECK_INTERVAL"
          } > "$sparkle_xcconfig"
          echo "APP_MACOS_DMG_XCCONFIG=$sparkle_xcconfig" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate into temporary keychain
        shell: bash
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/pushgo-developer-id.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          developer_id_p12="$RUNNER_TEMP/pushgo-developer-id.p12"

          printf "%s" "$DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 --decode > "$developer_id_p12"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$developer_id_p12" \
            -k "$keychain_path" \
            -P "$DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security \
            -T /usr/bin/xcrun

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path" >/dev/null
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"

          codesigning_identity_output="$(security find-identity -v -p codesigning "$keychain_path")"
          printf '%s\n' "$codesigning_identity_output"
          if ! grep -q "Developer ID Application" <<<"$codesigning_identity_output"; then
            echo "Imported certificates do not expose a Developer ID Application signing identity."
            exit 1
          fi

          {
            echo "DEVELOPER_ID_KEYCHAIN_PATH=$keychain_path"
            echo "DEVELOPER_ID_KEYCHAIN_PASSWORD=$keychain_password"
            echo "RELEASE_SIGNING_KEYCHAIN_PATH=$keychain_path"
            echo "RELEASE_SIGNING_KEYCHAIN_PASSWORD=$keychain_password"
          } >> "$GITHUB_ENV"
        env:
          DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}

      - name: Run fastlane beta dmg
        if: steps.resolve.outputs.release_kind == 'beta'
        run: bundle _2.5.23_ exec fastlane ios beta_dmg

      - name: Run fastlane release dmg
        if: steps.resolve.outputs.release_kind == 'release'
        run: bundle _2.5.23_ exec fastlane ios release_dmg

      - name: Resolve release DMG artifact
        shell: bash
        run: |
          set -euo pipefail
          version="v${SEMVER_FULL_VERSION}"

          shopt -s nullglob
          dmg_files=(artifacts/release/*"${version}"*.dmg)
          shopt -u nullglob

          if [[ ${#dmg_files[@]} -ne 1 ]]; then
            echo "Expected exactly one release DMG for ${version} under artifacts/release, found ${#dmg_files[@]}" >&2
            if (( ${#dmg_files[@]} > 0 )); then
              printf '%s\n' "${dmg_files[@]}" >&2
            fi
            exit 1
          fi

          dmg_path="${dmg_files[0]}"
          dmg_name="$(basename "${dmg_path}")"

          {
            echo "RELEASE_DMG_PATH=${dmg_path}"
            echo "RELEASE_DMG_NAME=${dmg_name}"
          } >> "$GITHUB_ENV"

          ls -lh "${dmg_path}"

      - name: Prepare Sparkle Ed25519 signing key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PUSHGO_SPARKLE_PRIVATE_ED_KEY_B64:-}" ]; then
            echo "Missing required secret: PUSHGO_SPARKLE_PRIVATE_ED_KEY_B64" >&2
            exit 1
          fi
          mkdir -p "$GITHUB_WORKSPACE/.ci"
          key_path="$GITHUB_WORKSPACE/.ci/sparkle-ed25519-private-key.pem"
          echo "$PUSHGO_SPARKLE_PRIVATE_ED_KEY_B64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "PUSHGO_SPARKLE_PRIVATE_ED_KEY_PATH=$key_path" >> "$GITHUB_ENV"
        env:
          PUSHGO_SPARKLE_PRIVATE_ED_KEY_B64: ${{ secrets.PUSHGO_SPARKLE_PRIVATE_ED_KEY_B64 }}

      - name: Generate Sparkle appcast
        shell: bash
        run: |
          set -euo pipefail
          track="stable"
          if [[ "${RELEASE_KIND}" == "beta" ]]; then
            track="beta"
          fi
          version="v${SEMVER_FULL_VERSION}"
          update_notes_json="release/update-notes/${version}.json"
          if [[ ! -f "${update_notes_json}" ]]; then
            echo "Missing update notes source for appcast: ${update_notes_json}" >&2
            exit 1
          fi

          dmg_stem="${RELEASE_DMG_PATH%.dmg}"
          rm -f "${dmg_stem}.md" "${dmg_stem}.html"

          release_base_url="${PUSHGO_SPARKLE_BASE_URL%/}/${track}/v${SEMVER_FULL_VERSION}/"

          ./scripts/release_appcast.sh "$track" artifacts/release \
            --expected-version "${version}" \
            --download-url-prefix "$release_base_url" \
            --release-notes-url-prefix "$release_base_url" \
            --ed-key-file "${PUSHGO_SPARKLE_PRIVATE_ED_KEY_PATH}" \
            --account ""

          ls -lh release/appcast.xml artifacts/release/*.txt

      - name: Prepare update deploy SSH key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64:-}" ]; then
            echo "Missing required secret: PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64" >&2
            exit 1
          fi
          mkdir -p "$GITHUB_WORKSPACE/.ci"
          echo "$PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64" | base64 --decode > "$GITHUB_WORKSPACE/.ci/update-deploy-key"
          chmod 600 "$GITHUB_WORKSPACE/.ci/update-deploy-key"
          echo "PUSHGO_UPDATE_DEPLOY_SSH_KEY_FILE=$GITHUB_WORKSPACE/.ci/update-deploy-key" >> "$GITHUB_ENV"
        env:
          PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64: ${{ secrets.PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64 }}

      - name: Install update deploy known_hosts
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PUSHGO_UPDATE_DEPLOY_KNOWN_HOSTS:-}" ]]; then
            echo "Missing required secret: PUSHGO_UPDATE_DEPLOY_KNOWN_HOSTS" >&2
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$PUSHGO_UPDATE_DEPLOY_KNOWN_HOSTS" | sed 's/\r$//' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
        env:
          PUSHGO_UPDATE_DEPLOY_KNOWN_HOSTS: ${{ secrets.PUSHGO_UPDATE_DEPLOY_KNOWN_HOSTS }}

      - name: Publish DMG update artifacts to update host
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PUSHGO_UPDATE_DEPLOY_HOST:-}" || -z "${PUSHGO_UPDATE_DEPLOY_USER:-}" || -z "${PUSHGO_UPDATE_DEPLOY_PATH:-}" ]]; then
            echo "Missing required deploy configuration. Please set PUSHGO_UPDATE_DEPLOY_HOST, PUSHGO_UPDATE_DEPLOY_USER, and PUSHGO_UPDATE_DEPLOY_PATH." >&2
            exit 1
          fi
          track="stable"
          if [[ "${RELEASE_KIND}" == "beta" ]]; then
            track="beta"
          fi
          ./scripts/publish_update_artifacts.sh \
            artifacts/release \
            release/appcast.xml \
            "${PUSHGO_UPDATE_DEPLOY_USER}@${PUSHGO_UPDATE_DEPLOY_HOST}" \
            "${PUSHGO_UPDATE_DEPLOY_PATH}" \
            "${track}" \
            "v${SEMVER_FULL_VERSION}"
        env:
          PUSHGO_UPDATE_DEPLOY_HOST: ${{ secrets.PUSHGO_UPDATE_DEPLOY_HOST }}
          PUSHGO_UPDATE_DEPLOY_USER: ${{ secrets.PUSHGO_UPDATE_DEPLOY_USER }}
          PUSHGO_UPDATE_DEPLOY_PATH: ${{ secrets.PUSHGO_UPDATE_DEPLOY_PATH }}

      - name: Upload Sparkle feed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pushgo-macos-sparkle-${{ github.run_id }}
          path: |
            release/appcast.xml
            artifacts/release/*.txt
          if-no-files-found: error

      - name: Upload signed DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: pushgo-macos-dmg-${{ github.run_id }}
          path: ${{ env.RELEASE_DMG_PATH }}
          if-no-files-found: error

      - name: Publish DMG to GitHub Release
        id: github_release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api_root="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}"
          prerelease="false"
          if [[ "${RELEASE_KIND}" == "beta" ]]; then
            prerelease="true"
          fi

          release_payload="$(jq -cn \
            --arg tag_name "${GITHUB_REF_NAME}" \
            --arg target_commitish "${GITHUB_SHA}" \
            --arg name "${RELEASE_TITLE}" \
            --arg body "${RELEASE_CHANGELOG_BODY}" \
            --argjson prerelease "${prerelease}" \
            '{
              tag_name: $tag_name,
              target_commitish: $target_commitish,
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease,
              generate_release_notes: false
            }')"

          release_lookup_file="$(mktemp)"
          release_status="$(
            bash ./scripts/retry_command.sh --always -- \
            curl -sSL -o "${release_lookup_file}" -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_root}/releases/tags/${GITHUB_REF_NAME}" || true
          )"

          if [[ "${release_status}" == "200" ]]; then
            release_id="$(jq -r '.id' "${release_lookup_file}")"
            release_response_file="$(mktemp)"
            bash ./scripts/retry_command.sh --always -- \
            curl -fsSL -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_root}/releases/${release_id}" \
              -d "${release_payload}" >"${release_response_file}"
          elif [[ "${release_status}" == "404" ]]; then
            release_response_file="$(mktemp)"
            bash ./scripts/retry_command.sh --always -- \
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_root}/releases" \
              -d "${release_payload}" >"${release_response_file}"
          else
            echo "Failed to look up release for tag ${GITHUB_REF_NAME}, status=${release_status}" >&2
            cat "${release_lookup_file}" >&2
            exit 1
          fi

          release_id="$(jq -r '.id' "${release_response_file}")"
          upload_url="$(jq -r '.upload_url' "${release_response_file}" | sed 's/{?name,label}//')"

          {
            echo "release_id=${release_id}"
            echo "upload_url=${upload_url}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload DMG assets to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_root="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}"
          release_id="${{ steps.github_release.outputs.release_id }}"
          upload_url="${{ steps.github_release.outputs.upload_url }}"
          asset_file="${RELEASE_DMG_PATH}"
          if [[ -z "${asset_file}" || ! -f "${asset_file}" ]]; then
            echo "Resolved release DMG is missing: ${asset_file:-<empty>}" >&2
            exit 1
          fi

          assets_json="$(bash ./scripts/retry_command.sh --always -- \
            curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_root}/releases/${release_id}/assets?per_page=100")"

          asset_name="$(basename "${asset_file}")"
          while IFS= read -r asset_id; do
            [[ -z "${asset_id}" ]] && continue
            bash ./scripts/retry_command.sh --always -- \
            curl -fsSL -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_root}/releases/assets/${asset_id}" >/dev/null
          done < <(printf '%s' "${assets_json}" | jq -r --arg name "${asset_name}" '.[] | select(.name == $name) | .id')

          encoded_asset_name="$(jq -rn --arg value "${asset_name}" '$value|@uri')"
          bash ./scripts/retry_command.sh --always -- \
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/x-apple-diskimage" \
            --data-binary @"${asset_file}" \
            "${upload_url}?name=${encoded_asset_name}" >/dev/null

      - name: Commit Sparkle appcast state
        id: commit_appcast
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          target_branch="${DEFAULT_BRANCH:-main}"
          appcast_snapshot="$RUNNER_TEMP/release-appcast.xml"

          cp release/appcast.xml "$appcast_snapshot"
          rm -f release/appcast.xml

          bash ./scripts/retry_command.sh --always -- git fetch origin "$target_branch"
          git checkout -B "$target_branch" "origin/$target_branch"

          mkdir -p release
          cp "$appcast_snapshot" release/appcast.xml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/appcast.xml

          if git diff --cached --quiet -- release/appcast.xml; then
            echo "release/appcast.xml unchanged; skipping commit"
            exit 0
          fi

          git commit -m "Update Sparkle appcast for ${GITHUB_REF_NAME}"
          bash ./scripts/retry_command.sh --always -- git push origin "HEAD:${target_branch}"

      - name: Report non-blocking appcast commit failure
        if: steps.commit_appcast.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "## Sparkle appcast repo sync warning"
            echo
            echo "Release artifacts were published, but committing \`release/appcast.xml\` back to the default branch failed."
            echo "Please inspect the \`Commit Sparkle appcast state\` step and sync the file manually if needed."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload DMG diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pushgo-dmg-diagnostics-${{ github.run_id }}
          path: artifacts/release/**
          if-no-files-found: warn
